name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate JSON manifests
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json'))"
          node -e "JSON.parse(require('fs').readFileSync('hooks/hooks.json'))"
          node -e "JSON.parse(require('fs').readFileSync('package.json'))"

      - name: Check versions synced across manifests
        run: node scripts/check-versions.js

      - name: Run unit + integration tests
        run: npm test

      - name: CLI dry-run install
        run: node cli.js --dry-run --force

      - name: CLI dry-run uninstall
        run: node cli.js --dry-run --uninstall --force

      - name: Hook-audit manual tests
        run: bash skills/hook-audit/tests/manual-test.sh
